<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent — настройки</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Research Agent</h1>
      <p class="topbar-tagline">Настройки API</p>
    </div>
    <nav class="main-nav" aria-label="Разделы">
      <a href="./index.html">Главная</a>
      <a href="./history.html">История</a>
      <a href="./settings.html" aria-current="page">Настройки</a>
    </nav>
  </header>

  <main class="page-narrow">
    <section class="panel">
      <h2>Базовый URL API</h2>
      <p class="muted">Используется всеми страницами интерфейса (хранится в браузере).</p>
      <form id="apiSettingsForm" class="stack">
        <label for="apiBaseInput">API</label>
        <input id="apiBaseInput" name="apiBase" type="text" value="/api/v1" spellcheck="false" autocomplete="off">
        <button type="submit">Сохранить</button>
      </form>
      <p id="statusBar" class="status-bar" aria-live="polite"></p>
    </section>
  </main>

  <script src="./common.js"></script>
  <script src="./settings.js"></script>
</body>
</html>
