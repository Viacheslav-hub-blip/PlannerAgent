<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent — файлы</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Research Agent</h1>
      <p class="topbar-tagline">Файлы и артефакты</p>
    </div>
    <nav class="main-nav" aria-label="Разделы">
      <a href="./index.html">Главная</a>
      <a href="./history.html">История</a>
      <a href="./settings.html">Настройки</a>
    </nav>
  </header>

  <main class="page-wide">
    <div id="runChrome"></div>
    <p id="statusBar" class="status-bar" aria-live="polite"></p>
    <div class="split files-split">
      <div class="panel">
        <div class="panel-header">
          <h2>Artifacts</h2>
          <button id="refreshArtifactsButton" type="button">Обновить</button>
        </div>
        <div id="artifactsList" class="artifact-list"></div>
      </div>
      <div class="panel artifact-preview">
        <h2>Preview</h2>
        <pre id="artifactPreview" class="pre muted">Выберите файл.</pre>
      </div>
    </div>
  </main>

  <script src="./common.js"></script>
  <script src="./files.js"></script>
</body>
</html>
