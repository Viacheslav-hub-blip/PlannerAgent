<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent — аудит</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Research Agent</h1>
      <p class="topbar-tagline">Аудит узлов</p>
    </div>
    <nav class="main-nav" aria-label="Разделы">
      <a href="./index.html">Главная</a>
      <a href="./history.html">История</a>
      <a href="./settings.html">Настройки</a>
    </nav>
  </header>

  <main class="page-wide">
    <div id="runChrome"></div>
    <p id="statusBar" class="status-bar" aria-live="polite"></p>
    <div class="split audit-split">
      <div class="panel">
        <div class="panel-header">
          <h2>Timeline</h2>
          <button id="refreshGraphButton" type="button">Обновить</button>
        </div>
        <div id="nodesList" class="nodes-list"></div>
      </div>
      <div class="panel">
        <h2>Node Inspector</h2>
        <pre id="nodeInspector" class="pre muted">Выберите узел.</pre>
      </div>
    </div>
  </main>

  <script src="./common.js"></script>
  <script src="./audit.js"></script>
</body>
</html>
