<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Agent — уточнение</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Research Agent</h1>
      <p class="topbar-tagline">Уточнение исследования</p>
    </div>
    <nav class="main-nav" aria-label="Разделы">
      <a href="./index.html">Главная</a>
      <a href="./history.html">История</a>
      <a href="./settings.html">Настройки</a>
    </nav>
  </header>

  <main class="page-wide">
    <div id="runChrome"></div>
    <p id="statusBar" class="status-bar" aria-live="polite"></p>
    <div class="split followup-grid">
      <form id="followupForm" class="panel stack">
        <h2>Новая задача</h2>
        <label for="followupQuery">Запрос</label>
        <textarea id="followupQuery" rows="5" placeholder="Например: сравни гипотезу с альтернативой"></textarea>
        <label class="checkbox-row">
          <input id="includeCurrentRun" type="checkbox" checked>
          Передать текущий запуск как контекст
        </label>
        <button type="button" id="previewDialogContextButton">Проверить context</button>
        <button type="submit">Запустить follow-up</button>
      </form>
      <div class="panel">
        <h2>Context preview</h2>
        <pre id="dialogContextPreview" class="pre muted">Context ещё не собран.</pre>
      </div>
    </div>
  </main>

  <script src="./common.js"></script>
  <script src="./followup.js"></script>
</body>
</html>
